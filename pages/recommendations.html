<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recommendations</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="/config.js"></script>
<script src="/app.js"></script>
<style>
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes spin { to { transform: rotate(360deg); } }

.fade-in { animation: fadeIn 0.5s ease-out forwards; }
.track-item { animation: fadeIn 0.35s ease-out forwards; opacity: 0; }
.skeleton {
  background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.05) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 1rem;
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: inline-block;
}
#artistSearch:focus { outline: none; }
.seed-chip:hover .remove-btn { opacity: 1; }
.remove-btn { opacity: 0; transition: opacity 0.15s; }
</style>
</head>
<body class="bg-gradient-to-br from-purple-900 via-purple-800 to-indigo-900 min-h-screen text-white font-sans">

<header class="py-6 px-8 flex justify-center">
  <div class="cursor-pointer hover:scale-105 transition-transform" onclick="redirectToHomePage()">
    <svg width="500" height="80" viewBox="0 0 410 120" xmlns="http://www.w3.org/2000/svg">
    <g opacity="0.9" transform="translate(0, 20)">
      <polygon points="20,70 50,20 80,70 75,75 60,75 60,40 40,40 40,75 25,75" fill="#10b981" opacity="0.8" transform="rotate(8 50 47)"/>
      <text x="50" y="65" font-family="Arial Black" font-size="48" font-weight="900" fill="white" text-anchor="middle">A</text>
      <line x1="25" y1="40" x2="75" y2="75" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
      <polygon points="90,30 130,30 130,70 120,80 100,80 90,70" fill="#22d3ee" opacity="0.85" transform="rotate(-5 110 50)"/>
      <text x="110" y="68" font-family="Arial Black" font-size="48" font-weight="900" fill="white" text-anchor="middle">U</text>
      <line x1="95" y1="30" x2="125" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
      <polygon points="150,30 195,30 195,75 180,80 150,80 150,50" fill="#fbbf24" opacity="0.87" transform="rotate(6 172 50)"/>
      <text x="172" y="68" font-family="Arial Black" font-size="48" font-weight="900" fill="white" text-anchor="middle">R</text>
      <line x1="155" y1="30" x2="190" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
      <polygon points="210,70 240,20 270,70 265,75 250,75 250,40 230,40 230,75 215,75" fill="#ef4444" opacity="0.86" transform="rotate(-7 240 47)"/>
      <text x="240" y="65" font-family="Arial Black" font-size="48" font-weight="900" fill="white" text-anchor="middle">A</text>
      <line x1="215" y1="40" x2="265" y2="75" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
      <polygon points="285,30 330,30 330,70 330,80 285,80" fill="#8b5cf6" opacity="0.88" transform="rotate(5 307 50)"/>
      <text x="307" y="68" font-family="Arial Black" font-size="48" font-weight="900" fill="white" text-anchor="middle">L</text>
      <line x1="290" y1="30" x2="325" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
      <polygon points="345,30 390,30 390,70 380,80 345,75" fill="#ec4899" opacity="0.85" transform="rotate(-6 367 50)"/>
      <text x="367" y="68" font-family="Arial Black" font-size="48" font-weight="900" fill="white" text-anchor="middle">S</text>
      <line x1="350" y1="30" x2="385" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
      <line x1="80" y1="50" x2="90" y2="50" stroke="white" stroke-width="1.5" opacity="0.3"/>
      <line x1="130" y1="55" x2="150" y2="55" stroke="white" stroke-width="1.5" opacity="0.3"/>
      <line x1="195" y1="50" x2="210" y2="50" stroke="white" stroke-width="1.5" opacity="0.3"/>
      <line x1="270" y1="55" x2="285" y2="55" stroke="white" stroke-width="1.5" opacity="0.3"/>
      <line x1="330" y1="50" x2="345" y2="50" stroke="white" stroke-width="1.5" opacity="0.3"/>
    </g>
    </svg>
  </div>
</header>

<nav class="max-w-4xl mx-auto px-4 py-4">
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <a href="/pages/tracks/shorttracks.html" class="bg-white/10 backdrop-blur-sm hover:bg-white/20 rounded-xl p-4 text-center font-semibold transition-all hover:scale-105">Top Tracks</a>
    <a href="/pages/artists/shortartists.html" class="bg-white/10 backdrop-blur-sm hover:bg-white/20 rounded-xl p-4 text-center font-semibold transition-all hover:scale-105">Top Artists</a>
    <a href="/pages/recent.html" class="bg-white/10 backdrop-blur-sm hover:bg-white/20 rounded-xl p-4 text-center font-semibold transition-all hover:scale-105">Recently Played</a>
    <a href="/pages/recommendations.html" class="bg-white/20 backdrop-blur-sm rounded-xl p-4 text-center font-semibold border border-white/30">Recommendations</a>
  </div>
</nav>

<div class="max-w-4xl mx-auto px-6 py-8 fade-in">
  <h1 class="text-4xl md:text-5xl font-bold mb-1 bg-gradient-to-r from-green-400 to-blue-400 bg-clip-text text-transparent">Recommended</h1>
  <p class="text-purple-300 mb-8 text-sm">Powered by your taste + Last.fm similarity</p>

  <!-- Seed Builder -->
  <div class="mb-8">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-sm font-semibold text-purple-300 uppercase tracking-widest">Seed Artists <span class="text-purple-500 normal-case font-normal">(up to 5)</span></h2>
      <button id="useMyTopBtn" class="text-xs text-green-400 hover:text-green-300 underline underline-offset-2 transition-colors">Use my top artists</button>
    </div>
    <div id="seedChips" class="flex flex-wrap gap-2 mb-3 min-h-[36px]"></div>
    <div class="relative">
      <input id="artistSearch" type="text" placeholder="Search for an artist to add..."
        class="w-full bg-white/10 backdrop-blur-sm border border-white/20 rounded-xl px-4 py-3 text-sm text-white placeholder-purple-400 focus:border-green-400/50 focus:bg-white/15 transition-all">
      <div id="searchResults" class="absolute z-10 top-full mt-1 w-full bg-purple-900/95 backdrop-blur-sm border border-white/10 rounded-xl overflow-hidden hidden shadow-2xl"></div>
    </div>
  </div>

  <!-- Generate -->
  <button id="generateBtn"
    class="w-full mb-8 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 rounded-xl py-3 font-semibold transition-all hover:scale-[1.01] hover:shadow-lg flex items-center justify-center gap-2">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
    </svg>
    Generate Recommendations
  </button>

  <!-- Loading -->
  <div id="loadingState" class="hidden space-y-3">
    <p id="loadingMsg" class="text-purple-300 text-sm mb-4 text-center">Finding similar artists...</p>
    <div class="skeleton h-20"></div>
    <div class="skeleton h-20"></div>
    <div class="skeleton h-20"></div>
    <div class="skeleton h-20"></div>
    <div class="skeleton h-20"></div>
  </div>

  <!-- Error -->
  <div id="errorState" class="hidden text-center py-16">
    <div class="text-5xl mb-4">🎵</div>
    <p class="text-purple-300 text-lg" id="errorMsg">Couldn't load recommendations.</p>
    <p class="text-purple-400 text-sm mt-1">Try different seed artists or check your connection.</p>
  </div>

  <!-- Results -->
  <div id="resultsSection" class="hidden">
    <div class="flex items-center justify-between mb-6">
      <p class="text-purple-300 text-sm" id="resultCount"></p>
      <button id="savePlaylistBtn"
        class="flex items-center gap-2 bg-green-500/20 hover:bg-green-500/30 border border-green-400/30 rounded-xl px-4 py-2 text-sm font-semibold text-green-400 transition-all hover:scale-105">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
        Save as Playlist
      </button>
    </div>
    <div id="recGroups"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-xl font-semibold shadow-2xl transition-all duration-300 opacity-0 pointer-events-none z-50 flex items-center gap-2">
  <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
  <span id="toastMsg"></span>
</div>

<script>
const LASTFM_KEY = 'e8b4afbb9cca0d15d62a66cd41654f3d';
let seedArtists = [];
let allGeneratedTracks = [];
let searchTimeout = null;

function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 ${isError ? 'bg-red-500' : 'bg-green-500'} text-white px-6 py-3 rounded-xl font-semibold shadow-2xl transition-all duration-300 z-50 flex items-center gap-2`;
  document.getElementById('toastMsg').textContent = msg;
  toast.style.opacity = '1';
  setTimeout(() => { toast.style.opacity = '0'; }, 3500);
}

function renderSeeds() {
  const c = document.getElementById('seedChips');
  c.innerHTML = '';
  seedArtists.forEach((a, i) => {
    const chip = document.createElement('div');
    chip.className = 'seed-chip flex items-center gap-2 bg-white/15 border border-white/20 rounded-full pl-1 pr-2 py-1 text-sm';
    chip.innerHTML = `
      ${a.img ? `<img src="${a.img}" class="w-6 h-6 rounded-full object-cover shrink-0">` : ''}
      <span class="truncate max-w-[120px]">${a.name}</span>
      <button class="remove-btn w-4 h-4 text-purple-300 hover:text-white transition-colors shrink-0" onclick="removeSeed(${i})">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    `;
    c.appendChild(chip);
  });
}

function removeSeed(i) { seedArtists.splice(i, 1); renderSeeds(); }

function addSeed(artist) {
  if (seedArtists.length >= 5) { showToast('Max 5 seed artists', true); return; }
  if (seedArtists.find(a => a.id === artist.id)) return;
  seedArtists.push(artist);
  renderSeeds();
  document.getElementById('artistSearch').value = '';
  document.getElementById('searchResults').classList.add('hidden');
}

document.getElementById('artistSearch').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  const q = e.target.value.trim();
  if (q.length < 1) { document.getElementById('searchResults').classList.add('hidden'); return; }
  searchTimeout = setTimeout(() => doArtistSearch(q), 300);
});

document.addEventListener('click', e => {
  if (!e.target.closest('#artistSearch') && !e.target.closest('#searchResults'))
    document.getElementById('searchResults').classList.add('hidden');
});

async function doArtistSearch(q) {
  const res = await fetchWebApi(`v1/search?q=${encodeURIComponent(q)}&type=artist&limit=5`, 'GET');
  const artists = res?.artists?.items || [];
  const box = document.getElementById('searchResults');
  if (!artists.length) { box.classList.add('hidden'); return; }
  box.innerHTML = '';
  artists.forEach(artist => {
    const img = artist.images?.[artist.images.length - 1]?.url || '';
    const row = document.createElement('button');
    row.className = 'w-full flex items-center gap-3 px-4 py-3 hover:bg-white/10 transition-colors text-left';
    row.innerHTML = `
      ${img ? `<img src="${img}" class="w-8 h-8 rounded-full object-cover shrink-0">` : '<div class="w-8 h-8 rounded-full bg-white/10 shrink-0"></div>'}
      <span class="text-sm font-medium truncate">${artist.name}</span>
    `;
    row.addEventListener('click', () => addSeed({ id: artist.id, name: artist.name, img }));
    box.appendChild(row);
  });
  box.classList.remove('hidden');
}

document.getElementById('useMyTopBtn').addEventListener('click', async () => {
  const btn = document.getElementById('useMyTopBtn');
  btn.textContent = 'Loading...'; btn.disabled = true;
  try {
    const res = await fetchWebApi('v1/me/top/artists?limit=5&time_range=medium_term', 'GET');
    seedArtists = [];
    (res?.items || []).slice(0, 5).forEach(a => {
      const img = a.images?.[a.images.length - 1]?.url || '';
      seedArtists.push({ id: a.id, name: a.name, img });
    });
    renderSeeds();
  } catch { showToast('Could not load top artists', true); }
  btn.textContent = 'Use my top artists'; btn.disabled = false;
});

async function lfmSimilar(name) {
  const r = await fetch(`https://ws.audioscrobbler.com/2.0/?method=artist.getSimilar&artist=${encodeURIComponent(name)}&api_key=${LASTFM_KEY}&format=json&limit=8`);
  const d = await r.json();
  return (d?.similarartists?.artist || []).map(a => ({ name: a.name, match: Math.round(parseFloat(a.match) * 100) }));
}

const TAG_REMAP = {
  'indie rock': 'Indie Rock', 'indie pop': 'Indie Pop', 'alternative rock': 'Alternative',
  'alternative': 'Alternative', 'alt-rock': 'Alternative', 'pop': 'Pop', 'dance pop': 'Pop',
  'electropop': 'Pop', 'synth-pop': 'Pop', 'pop rock': 'Pop', 'art pop': 'Pop',
  'rock': 'Rock', 'electronic': 'Electronic', 'dance': 'Electronic', 'edm': 'Electronic',
  'hip-hop': 'Hip-Hop', 'hip hop': 'Hip-Hop', 'rap': 'Hip-Hop', 'trap': 'Hip-Hop',
  'conscious hip hop': 'Hip-Hop', 'melodic rap': 'Hip-Hop', 'southern hip hop': 'Hip-Hop',
  'east coast hip hop': 'Hip-Hop', 'gangster rap': 'Hip-Hop',
  'r&b': 'R&B', 'soul': 'R&B', 'neo soul': 'R&B', 'pop soul': 'R&B', 'contemporary r&b': 'R&B',
  'folk': 'Folk', 'acoustic': 'Folk', 'singer-songwriter': 'Folk', 'folk pop': 'Folk',
  'punk': 'Punk', 'metal': 'Metal', 'jazz': 'Jazz', 'country': 'Country', 'emo': 'Emo',
  'shoegaze': 'Shoegaze', 'dream pop': 'Dream Pop', 'post-punk': 'Post-Punk',
  'uk indie': 'Indie Rock', 'permanent wave': 'Alternative', 'new wave': 'New Wave',
  'mellow gold': 'Alternative', 'soft rock': 'Rock', 'classic rock': 'Rock',
};

document.getElementById('savePlaylistBtn').addEventListener('click', async () => {
  const btn = document.getElementById('savePlaylistBtn');
  if (!allGeneratedTracks.length) return;
  btn.innerHTML = `<span class="spinner"></span> Saving...`; btn.disabled = true;
  try {
    const userId = (await fetchWebApi('v1/me', 'GET'))?.id;
    const name = `aurals mix — ${new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
    const playlist = await fetchWebApi(`v1/users/${userId}/playlists`, 'POST', {
      name, description: `Based on: ${seedArtists.map(a => a.name).join(', ')}. Made by aurals.`, public: false
    });
    await fetchWebApi(`v1/playlists/${playlist.id}/tracks`, 'POST', { uris: allGeneratedTracks.slice(0, 100).map(t => t.uri) });
    showToast(`Saved "${name}" to Spotify!`);
    btn.innerHTML = `<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Saved!`;
  } catch {
    showToast('Could not save — check playlist-modify-private scope', true);
    btn.innerHTML = `<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg> Save as Playlist`;
    btn.disabled = false;
  }
});

document.getElementById('generateBtn').addEventListener('click', generate);

async function generate() {
  if (!seedArtists.length) { showToast('Add at least one seed artist', true); return; }

  const loadingState   = document.getElementById('loadingState');
  const errorState     = document.getElementById('errorState');
  const resultsSection = document.getElementById('resultsSection');
  const recGroups      = document.getElementById('recGroups');
  const loadingMsg     = document.getElementById('loadingMsg');
  const saveBtn        = document.getElementById('savePlaylistBtn');

  loadingState.classList.remove('hidden');
  errorState.classList.add('hidden');
  resultsSection.classList.add('hidden');
  recGroups.innerHTML = '';
  allGeneratedTracks = [];
  saveBtn.innerHTML = `<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg> Save as Playlist`;
  saveBtn.disabled = false;

  try {
    const knownNames = new Set(seedArtists.map(a => a.name.toLowerCase()));
    const similarMap = new Map();

    loadingMsg.textContent = 'Finding similar artists via Last.fm...';
    await Promise.all(seedArtists.map(async seed => {
      const similar = await lfmSimilar(seed.name);
      similar.forEach(({ name, match }) => {
        const key = name.toLowerCase();
        if (!knownNames.has(key) && !similarMap.has(key))
          similarMap.set(key, { name, match, becauseOf: seed.name });
      });
    }));

    const sorted = [...similarMap.values()].sort((a, b) => b.match - a.match).slice(0, 12);
    if (!sorted.length) throw new Error('Last.fm returned no similar artists');

    loadingMsg.textContent = 'Matching on Spotify + fetching genre tags...';
    const enriched = await Promise.all(sorted.map(async s => {
      const spotifyArtist = await fetchWebApi(
        `v1/search?q=${encodeURIComponent(s.name)}&type=artist&limit=1`, 'GET'
      ).then(r => r?.artists?.items?.[0] || null);
      // Use Spotify's own genre data — much more accurate than Last.fm tags
      const tags = spotifyArtist?.genres || [];
      return { ...s, spotifyArtist, tags };
    }));

    const valid = enriched.filter(e => e.spotifyArtist);
    if (!valid.length) throw new Error('No artists matched on Spotify');

    loadingMsg.textContent = 'Loading tracks...';
    const seen = new Set();
    await Promise.all(valid.map(async entry => {
      const r = await fetchWebApi(`v1/artists/${entry.spotifyArtist.id}/top-tracks?market=US`, 'GET');
      // Deduplicate by both track ID and album ID so the same album never appears twice
      entry.tracks = (r?.tracks || []).filter(t => {
        if (seen.has(t.id) || seen.has(t.album.id)) return false;
        seen.add(t.id);
        seen.add(t.album.id);
        return true;
      }).slice(0, 2);
      allGeneratedTracks.push(...entry.tracks);
    }));

    // Group by genre vibe using Spotify genres
    const groups = new Map();
    valid.forEach(entry => {
      if (!entry.tracks.length) return;
      let group = 'Other';
      for (const tag of entry.tags) {
        const r = TAG_REMAP[tag.toLowerCase()];
        if (r) { group = r; break; }
      }
      if (!groups.has(group)) groups.set(group, []);
      groups.get(group).push(entry);
    });

    loadingState.classList.add('hidden');
    resultsSection.classList.remove('hidden');
    document.getElementById('resultCount').textContent =
      `${allGeneratedTracks.length} tracks · ${groups.size} vibes`;

    groups.forEach((entries, groupName) => {
      const section = document.createElement('div');
      section.className = 'mb-8';
      section.innerHTML = `
        <h3 class="text-xs font-semibold text-purple-400 uppercase tracking-widest mb-3 flex items-center gap-2">
          <span class="h-px flex-1 bg-white/10"></span>${groupName}<span class="h-px flex-1 bg-white/10"></span>
        </h3>
        <ul class="space-y-3"></ul>
      `;
      const ul = section.querySelector('ul');
      let idx = 0;
      entries.forEach(entry => {
        entry.tracks.forEach(track => {
          const li = document.createElement('li');
          li.className = 'track-item';
          li.style.animationDelay = `${idx++ * 0.04}s`;
          const albumImg = track.album.images[0]?.url || '';
          const artistStr = track.artists.map(a => a.name).join(', ');
          li.innerHTML = `
            <a href="${track.external_urls.spotify}" target="_blank"
              class="flex items-center gap-4 bg-white/5 hover:bg-white/15 backdrop-blur-sm rounded-2xl p-4 transition-all hover:scale-[1.02] hover:shadow-xl group">
              <img src="${albumImg}" alt="" class="w-14 h-14 rounded-xl shadow-lg shrink-0">
              <div class="flex-1 min-w-0">
                <div class="font-semibold text-white truncate group-hover:text-green-400 transition-colors">${track.name}</div>
                <div class="text-purple-300 text-sm truncate">${artistStr}</div>
                <div class="text-purple-500 text-xs mt-0.5">Because you like <span class="text-purple-300">${entry.becauseOf}</span></div>
              </div>
              <div class="hidden md:flex flex-col items-end gap-1 shrink-0">
                <span class="text-purple-500 text-xs truncate max-w-[140px]">${track.album.name}</span>
              </div>
              <svg class="w-5 h-5 text-green-400 opacity-0 group-hover:opacity-100 transition-opacity shrink-0" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
              </svg>
            </a>
          `;
          ul.appendChild(li);
        });
      });
      recGroups.appendChild(section);
    });

  } catch (err) {
    console.error(err);
    loadingState.classList.add('hidden');
    document.getElementById('errorMsg').textContent = err.message || 'Something went wrong.';
    errorState.classList.remove('hidden');
  }
}

// Auto-load top artists on page load
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const res = await fetchWebApi('v1/me/top/artists?limit=3&time_range=medium_term', 'GET');
    (res?.items || []).forEach(a => {
      const img = a.images?.[a.images.length - 1]?.url || '';
      seedArtists.push({ id: a.id, name: a.name, img });
    });
    renderSeeds();
  } catch { /* silent fail */ }
});
</script>
</body>
</html>
