<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="/config.js"></script>
<script src="/app.js"></script>
<style>

}

.artist-item { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }

</head>

      <line x1="95" y1="30" x2="125" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
      <polygon points="150,30 195,30 195,75 180,80 150,80 150,50" fill="#fbbf24" opacity="0.87" transform="rotate(6 172 50)"/>
      <text x="172" y="68" font-family="Arial Black" font-size="48" font-weight="900" fill="white" text-anchor="middle">R</text>
      <line x1="155" y1="30" x2="190" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
      <polygon points="210,70 240,20 270,70 265,75 250,75 250,40 230,40 230,75 215,75" fill="#ef4444" opacity="0.86" transform="rotate(-7 240 47)"/>
      <text x="240" y="65" font-family="Arial Black" font-size="48" font-weight="900" fill="white" text-anchor="middle">A</text>
      <line x1="215" y1="40" x2="265" y2="75" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
      <polygon points="285,30 330,30 330,70 330,80 285,80" fill="#8b5cf6" opacity="0.88" transform="rotate(5 307 50)"/>
      <text x="307" y="68" font-family="Arial Black" font-size="48" font-weight="900" fill="white" text-anchor="middle">L</text>
      <line x1="290" y1="30" x2="325" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
      <polygon points="345,30 390,30 390,70 380,80 345,75" fill="#ec4899" opacity="0.85" transform="rotate(-6 367 50)"/>
      <text x="367" y="68" font-family="Arial Black" font-size="48" font-weight="900" fill="white" text-anchor="middle">S</text>
      <line x1="350" y1="30" x2="385" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
      <line x1="80" y1="50" x2="90" y2="50" stroke="white" stroke-width="1.5" opacity="0.3"/>
      <line x1="130" y1="55" x2="150" y2="55" stroke="white" stroke-width="1.5" opacity="0.3"/>
      <line x1="195" y1="50" x2="210" y2="50" stroke="white" stroke-width="1.5" opacity="0.3"/>
      <line x1="270" y1="55" x2="285" y2="55" stroke="white" stroke-width="1.5" opacity="0.3"/>
      <line x1="330" y1="50" x2="345" y2="50" stroke="white" stroke-width="1.5" opacity="0.3"/>
    </g>
    </svg>
  </div>
</header>

<!-- Navigation -->
<nav class="max-w-4xl mx-auto px-4 py-4">
<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
<a href="/pages/tracks/shorttracks.html"
class="bg-white/10 backdrop-blur-sm hover:bg-white/20 rounded-xl p-4 text-center font-semibold transition-all hover:scale-105 hover:shadow-lg">
Top Tracks
</a>
<a href="/pages/artists/shortartists.html"
class="bg-white/20 backdrop-blur-sm rounded-xl p-4 text-center font-semibold transition-all hover:scale-105 hover:shadow-lg border border-white/30">
Top Artists
</a>
<a href="/pages/recent.html"
class="bg-white/10 backdrop-blur-sm hover:bg-white/20 rounded-xl p-4 text-center font-semibold transition-all hover:scale-105 hover:shadow-lg">
Recently Played
</a>
<a href="/pages/recommendations.html"
class="bg-white/10 backdrop-blur-sm hover:bg-white/20 rounded-xl p-4 text-center font-semibold transition-all hover:scale-105 hover:shadow-lg">
Recommendations
</a>
</div>
</nav>

<!-- Main Content -->
<div class="max-w-4xl mx-auto px-6 py-8 fade-in">
<h1 class="text-4xl md:text-5xl font-bold mb-8 bg-gradient-to-r from-green-400 to-blue-400 bg-clip-text text-transparent">
Top Artists
</h1>

<!-- Time Range Tabs -->
<div id="tabs" class="flex items-center gap-2 mb-8 bg-white/10 backdrop-blur-sm rounded-2xl p-2 w-fit">
<button
onclick="switchTab('short_term', this)"
id="shortTermBtn"
class="tab-btn px-6 py-2 rounded-xl font-semibold transition-all bg-green-500 text-white shadow-lg">
Last 4 weeks
</button>
<button
onclick="switchTab('medium_term', this)"
id="mediumTermBtn"
class="tab-btn px-6 py-2 rounded-xl font-semibold transition-all text-purple-200 hover:text-white hover:bg-white/10">
Last 6 months
</button>
<button
onclick="switchTab('long_term', this)"
id="longTermBtn"
class="tab-btn px-6 py-2 rounded-xl font-semibold transition-all text-purple-200 hover:text-white hover:bg-white/10">
Last year
</button>
</div>

<!-- Artists List -->
<ul id="topArtistsList" class="space-y-3"></ul>
</div>

<script>
function switchTab(timeRange, clickedBtn) {
document.querySelectorAll('.tab-btn').forEach(btn => {
btn.classList.remove('bg-green-500', 'text-white', 'shadow-lg');
btn.classList.add('text-purple-200');
});
clickedBtn.classList.add('bg-green-500', 'text-white', 'shadow-lg');
clickedBtn.classList.remove('text-purple-200');
document.getElementById('topArtistsList').innerHTML = '';
loadArtists(timeRange);
}

async function loadArtists(timeRange) {
const response = await fetchWebApi(`v1/me/top/artists?limit=50&time_range=${timeRange}`, 'GET');
const artistsList = document.getElementById("topArtistsList");
artistsList.innerHTML = '';

response.items.forEach((artist, index) => {
const artistItem = document.createElement("li");
artistItem.classList.add("artist-item");
artistItem.style.animationDelay = `${index * 0.05}s`;

const imageUrl = artist.images?.[0]?.url || '/img/icon.svg';

artistItem.innerHTML = `
<a href="${artist.external_urls.spotify}" target="_blank"
class="flex items-center gap-4 bg-white/5 hover:bg-white/15 backdrop-blur-sm rounded-2xl p-4 transition-all hover:scale-[1.02] hover:shadow-xl group">
<span class="text-purple-300 font-bold text-lg w-8 text-center shrink-0">${index + 1}</span>
<img src="${imageUrl}" alt="${artist.name}" class="w-14 h-14 rounded-full shadow-lg shrink-0 object-cover">
<div class="flex-1 min-w-0">
<div class="font-semibold text-white truncate group-hover:text-green-400 transition-colors">${artist.name}</div>
<div class="text-purple-400 text-sm">${artist.followers.total.toLocaleString()} followers</div>
</div>
<div class="hidden md:flex items-center gap-2 shrink-0">
<div class="text-right">
<div class="text-white text-sm font-semibold">${artist.popularity}/100</div>
<div class="text-purple-400 text-xs">popularity</div>
</div>
<div class="w-16 bg-white/10 rounded-full h-1.5">
<div class="bg-gradient-to-r from-green-400 to-blue-400 h-1.5 rounded-full" style="width: ${artist.popularity}%"></div>
</div>
</div>
<svg class="w-5 h-5 text-green-400 opacity-0 group-hover:opacity-100 transition-opacity shrink-0" fill="currentColor" viewBox="0 0 24 24">
<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
</svg>
</a>
`;
artistsList.appendChild(artistItem);
});
}

document.addEventListener("DOMContentLoaded", () => {
loadArtists('short_term');
});
</script>
</body>
</html>
